<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ValoraX – Dashboard</title>

<style>
:root{
  --bg:#000;
  --text:#fff;
  --muted:rgba(255,255,255,.60);
  --muted2:rgba(255,255,255,.35);
  --line:rgba(255,255,255,.15);
  --accent:#46f39a;

  --cardA:rgba(255,255,255,.06);
  --cardB:rgba(255,255,255,.04);
}

*{box-sizing:border-box}

html, body {
  height: 100%;
  margin: 0;
  overflow: hidden;            /* kein Scroll */
  overscroll-behavior: none;   /* kein iOS/Android bounce */
  touch-action: manipulation;  /* reduziert double-tap zoom auf Buttons */
}
button, a {
  touch-action: manipulation;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  min-height:100vh;
  display:block;
  overflow-x:hidden;
}

.container{
  width:100%;
  max-width:560px;
  margin:0 auto;
  min-height:100vh;
  padding: 18px 16px calc(120px + env(safe-area-inset-bottom));
}

/* Brand (ValoraX) */
.brandRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-top:8px;
}
.brand{
  font-weight:900;
  font-size:16px;
  letter-spacing:.02em;
}
.brand span{ color:var(--accent); }

.avatar{
  width:38px;height:38px;
  border-radius:999px;
  background:rgba(255,255,255,.28);
  display:grid;
  place-items:center;
  font-weight:1000;
  color:#000;
}

/* Tabs big like app */
.tabs{
  display:flex;
  align-items:baseline;
  gap:18px;
  margin-top:18px;
}
.tabs .tab{
  font-size:34px;
  font-weight:1000;
  letter-spacing:-.02em;
  color:rgba(255,255,255,.35);
}
.tabs .tab.active{ color:#fff; }

/* Total */
.totalBlock{ margin-top:26px; }
.totalLabel{
  color:rgba(255,255,255,.42);
  font-weight:900;
  font-size:15px;
  margin-bottom:6px;
}
.totalValue{
  font-size:44px;
  font-weight:1100;
  letter-spacing:-.03em;
}

/* Quick cards */
.quickGrid{
  margin-top:22px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.quickCard{
  border-radius:22px;
  padding:18px;
  background:linear-gradient(180deg, var(--cardA), var(--cardB));
  border:1px solid rgba(255,255,255,.10);
  min-height:92px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
.quickTitle{
  font-weight:1000;
  font-size:18px;
  color:rgba(255,255,255,.78);
}
.quickPlus{
  width:34px;height:34px;
  border-radius:999px;
  background:rgba(255,255,255,.18);
  display:grid;
  place-items:center;
  color:#fff;
  font-size:18px;
  font-weight:1000;
}

/* Section */
.section{ margin-top:28px; }
.sectionHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}
.sectionHeader h3{
  margin:0;
  font-size:22px;
  font-weight:1100;
}
.sectionHeader .right{
  color:rgba(255,255,255,.40);
  font-weight:900;
  display:flex;
  align-items:center;
  gap:8px;
}

.list{
  display:flex;
  flex-direction:column;
  gap:18px;
}
.item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
}
.itemLeft b{
  display:block;
  font-size:20px;
  font-weight:1100;
}
.itemLeft span{
  display:block;
  margin-top:4px;
  font-size:15px;
  font-weight:900;
  color:rgba(255,255,255,.30);
}
.itemRight{
  display:flex;
  align-items:center;
  gap:14px;
  color:#fff;
  font-weight:1100;
  font-size:18px;
}
.ring{
  width:26px;height:26px;
  border-radius:999px;
  border:4px solid rgba(255,255,255,.20);
}

/* Banner */
.banner{
  margin:22px 0;
  padding:16px 16px;
  border-radius:18px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.10);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.banner b{ display:block; font-size:18px; font-weight:1100; color:rgba(255,255,255,.55); }
.banner span{ display:block; margin-top:4px; color:rgba(255,255,255,.28); font-weight:900; }
.bannerBtn{
  width:42px;height:42px;border-radius:999px;
  background:rgba(255,255,255,.18);
  display:grid;place-items:center;
  color:#fff;font-weight:1100;font-size:20px;
}

/* Bottom actions */
.bottomActions{
  position:fixed;
  left:0; right:0; bottom:0;
  padding:14px 16px calc(18px + env(safe-area-inset-bottom));
  background:linear-gradient(180deg, rgba(0,0,0,0), rgba(0,0,0,.55) 28%, rgba(0,0,0,.85));
  backdrop-filter: blur(8px);
}
.bottomInner{
  max-width:560px;
  margin:0 auto;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.actionBtn{
  min-height:58px;
  height:62px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.18);
  background:#fff;
  color:#000;
  font-weight:1100;
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  cursor:pointer;
  -webkit-tap-highlight-color: transparent;
}
.actionBtn:active{ transform: translateY(1px); }
.actionBtn .icon{ opacity:.85; font-size:20px; }

/* Modal overlay */
.backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.72);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  z-index:30;
}

.modal{
  width:min(560px, 100%);
  background:#060606;
  border:1px solid rgba(255,255,255,.18);
  border-radius:22px;
  padding:18px;
  box-shadow:0 28px 70px rgba(0,0,0,.75);
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.18);
  background:transparent;
  color:rgba(255,255,255,.90);
  font-weight:1000;
  font-size:12px;
}

.modalTitle{
  margin:10px 0 6px 0;
  font-size:20px;
  font-weight:1000;
  letter-spacing:-.01em;
}
.modalText{
  margin:0;
  color:var(--muted);
  font-size:13px;
  line-height:1.5;
  font-weight:700;
}

.refChip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:transparent;
  color:#fff;
  font-weight:1000;
  font-size:12px;
  margin-top:12px;
}

.reward{
  margin-top:14px;
  padding:14px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.04);
}
.rewardLeft{ display:flex; flex-direction:column; gap:4px; }
.rewardLabel{ color:var(--muted2); font-size:12px; font-weight:900; letter-spacing:.02em; }
.rewardValue{ font-size:18px; font-weight:1100; letter-spacing:-.01em; }
.rewardHint{ color:var(--muted2); font-size:12px; font-weight:900; }

.actions{ margin-top:14px; }
.btnPrimary{
  width:100%;
  height:52px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.18);
  background:#fff;
  color:#000;
  font-weight:1000;
  font-size:14px;
  cursor:pointer;
}
.btnPrimary:active{ transform: translateY(1px); }

/* Responsive */
@media (max-width: 420px){
  .tabs .tab{ font-size: 28px; }
  .totalValue{ font-size: 38px; }
  .sectionHeader h3{ font-size: 20px; }
  .itemLeft b{ font-size: 18px; }
  .itemRight{ font-size: 16px; }
}
@media (max-width: 360px){
  .quickGrid{ grid-template-columns: 1fr; }
  .bottomInner{ grid-template-columns: 1fr; }
}
@media (max-height: 700px){
  .modal{
    max-height: calc(100vh - 40px);
    overflow:auto;
  }
}
</style>
</head>

<body>
  <div class="container" id="dash">

    <div class="brandRow">
      <div class="brand">Valora<span>X</span></div>
      <div class="avatar">A</div>
    </div>

    <div class="tabs">
      <div class="tab active" id="tabPortfolioBig">Portfolio</div>
      <div class="tab" id="tabCashBig">Cash</div>
    </div>

    <div class="totalBlock">
      <div class="totalLabel" id="totalLabel">Gesamt</div>
      <div class="totalValue" id="totalValue">0,00 €</div>
    </div>

    <div class="quickGrid">
      <div class="quickCard">
        <div class="quickTitle" id="quick1">Sparpläne</div>
        <div class="quickPlus">+</div>
      </div>
      <div class="quickCard">
        <div class="quickTitle" id="quick2">Order</div>
        <div class="quickPlus">+</div>
      </div>
    </div>

    <div class="section">
      <div class="sectionHeader">
        <h3 id="investmentsTitle">Investments</h3>
        <div class="right" id="splitText">Split <span style="font-size:18px;opacity:.7;">▾</span></div>
      </div>

      <div class="list">
        <div class="item">
          <div class="itemLeft">
            <b>Brokerage</b>
            <span>0,00 €</span>
          </div>
          <div class="itemRight">
            <div>0 %</div>
            <div class="ring"></div>
          </div>
        </div>

        <div class="item">
          <div class="itemLeft">
            <b>Private Markets</b>
            <span>0,00 €</span>
          </div>
          <div class="itemRight">
            <div>0 %</div>
            <div class="ring"></div>
          </div>
        </div>
      </div>

      <div class="banner">
        <div>
          <b id="bannerTitle">Zinsprodukte</b>
          <span id="bannerSub">Langfristiges Portfolio mit stabilen Zinsen</span>
        </div>
        <div class="bannerBtn">+</div>
      </div>

      <div class="list">
        <div class="item">
          <div class="itemLeft">
            <b>Crypto Wallet</b>
            <span>0,00 €</span>
          </div>
          <div class="itemRight">
            <div>0 %</div>
            <div class="ring"></div>
          </div>
        </div>
      </div>

      <div style="margin-top:22px;color:rgba(255,255,255,.28);font-weight:900;">
        Erfahre mehr über <span style="color:rgba(255,255,255,.70);">Multi-Portfolios</span>.
      </div>
    </div>
  </div>

  <!-- Bottom buttons -->
  <div class="bottomActions">
    <div class="bottomInner">
      <button class="actionBtn" type="button">
        <span id="searchText">Suche</span><span class="icon">🔍</span>
      </button>
      <button class="actionBtn" type="button">
        <span id="transferText">Überweisen</span><span class="icon">⤢</span>
      </button>
    </div>
  </div>

  <!-- Modal -->
  <div class="backdrop" id="backdrop" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="badge" id="badgeText"></div>

      <div class="modalTitle" id="modalTitle"></div>
      <p class="modalText" id="modalBody"></p>

      <div class="refChip">
        <span id="refName"></span>
      </div>

      <div class="reward">
        <div class="rewardLeft">
          <div class="rewardLabel" id="rewardLabel"></div>
          <div class="rewardValue" id="rewardValue"></div>
          <div class="rewardHint" id="rewardHint"></div>
        </div>
      </div>

      <div class="actions">
        <button class="btnPrimary" id="claimBtn"></button>
      </div>
    </div>
  </div>

<script>
const STORAGE_KEY_LANG = "valorax_lang";

const LANGS = {
  de:{ name:"Deutsch",
    badge:"Einladung",
    modalTitle:"Willkommen bei ValoraX",
    modalBody:(ref)=>`Du bist mit dem Einladungslink von <b>${ref}</b> beigetreten. Deine Willkommensprämie kannst du jetzt abholen.`,
    rewardLabel:"Deine Prämie", rewardValue:"€ 100 Bonus", rewardHint:"nur für neue Accounts",
    claim:"Prämie abholen",
    search:"Suche", transfer:"Überweisen", total:"Gesamt", portfolio:"Portfolio", cash:"Cash", investments:"Investments", split:"Split"
  },
  en:{ name:"English",
    badge:"Invite",
    modalTitle:"Welcome to ValoraX",
    modalBody:(ref)=>`You joined using the invite link from <b>${ref}</b>. You can claim your welcome bonus now.`,
    rewardLabel:"Your bonus", rewardValue:"€100 bonus", rewardHint:"new accounts only",
    claim:"Claim bonus",
    search:"Search", transfer:"Transfer", total:"Total", portfolio:"Portfolio", cash:"Cash", investments:"Investments", split:"Split"
  },
  es:{ name:"Español",
    badge:"Invitación",
    modalTitle:"Bienvenido a ValoraX",
    modalBody:(ref)=>`Te uniste con el enlace de invitación de <b>${ref}</b>. Puedes reclamar tu bonificación de bienvenida ahora.`,
    rewardLabel:"Tu premio", rewardValue:"Bono de €100", rewardHint:"solo cuentas nuevas",
    claim:"Reclamar premio",
    search:"Buscar", transfer:"Transferir", total:"Total", portfolio:"Cartera", cash:"Efectivo", investments:"Inversiones", split:"Distribución"
  },
  fr:{ name:"Français",
    badge:"Invitation",
    modalTitle:"Bienvenue sur ValoraX",
    modalBody:(ref)=>`Tu as rejoint via le lien d’invitation de <b>${ref}</b>. Tu peux récupérer ta prime de bienvenue maintenant.`,
    rewardLabel:"Ta prime", rewardValue:"Prime de 100 €", rewardHint:"nouveaux comptes",
    claim:"Récupérer la prime",
    search:"Rechercher", transfer:"Transférer", total:"Total", portfolio:"Portefeuille", cash:"Cash", investments:"Investissements", split:"Répartition"
  },
  it:{ name:"Italiano",
    badge:"Invito",
    modalTitle:"Benvenuto su ValoraX",
    modalBody:(ref)=>`Ti sei iscritto con il link di invito di <b>${ref}</b>. Puoi ritirare ora il bonus di benvenuto.`,
    rewardLabel:"Il tuo bonus", rewardValue:"Bonus €100", rewardHint:"solo nuovi account",
    claim:"Ritira bonus",
    search:"Cerca", transfer:"Trasferisci", total:"Totale", portfolio:"Portafoglio", cash:"Cash", investments:"Investimenti", split:"Ripartizione"
  },
  pt:{ name:"Português",
    badge:"Convite",
    modalTitle:"Bem-vindo à ValoraX",
    modalBody:(ref)=>`Aderiste através do link de convite de <b>${ref}</b>. Podes levantar agora o bónus de boas-vindas.`,
    rewardLabel:"O teu bónus", rewardValue:"Bónus 100 €", rewardHint:"só novas contas",
    claim:"Levantar bónus",
    search:"Pesquisar", transfer:"Transferir", total:"Total", portfolio:"Portefólio", cash:"Cash", investments:"Investimentos", split:"Distribuição"
  },
  nl:{ name:"Nederlands",
    badge:"Uitnodiging",
    modalTitle:"Welkom bij ValoraX",
    modalBody:(ref)=>`Je bent lid geworden via de uitnodigingslink van <b>${ref}</b>. Je kunt je welkomstbonus nu claimen.`,
    rewardLabel:"Jouw bonus", rewardValue:"€100 bonus", rewardHint:"alleen nieuwe accounts",
    claim:"Bonus claimen",
    search:"Zoeken", transfer:"Overmaken", total:"Totaal", portfolio:"Portfolio", cash:"Cash", investments:"Investeringen", split:"Verdeling"
  },
  ru:{ name:"Русский",
    badge:"Приглашение",
    modalTitle:"Добро пожаловать в ValoraX",
    modalBody:(ref)=>`Вы присоединились по ссылке-приглашению от <b>${ref}</b>. Сейчас можно забрать приветственный бонус.`,
    rewardLabel:"Ваш бонус", rewardValue:"Бонус €100", rewardHint:"только для новых аккаунтов",
    claim:"Забрать бонус",
    search:"Поиск", transfer:"Перевести", total:"Итого", portfolio:"Портфель", cash:"Кэш", investments:"Инвестиции", split:"Распределение"
  },
  zhCN:{ name:"简体中文",
    badge:"邀请",
    modalTitle:"欢迎来到 ValoraX",
    modalBody:(ref)=>`你通过 <b>${ref}</b> 的邀请链接加入。现在可以领取欢迎奖励。`,
    rewardLabel:"你的奖励", rewardValue:"€100 奖励", rewardHint:"仅限新账户",
    claim:"领取奖励",
    search:"搜索", transfer:"转账", total:"总计", portfolio:"投资组合", cash:"现金", investments:"投资", split:"分配"
  }
};

const params = new URLSearchParams(window.location.search);
const ref = params.get("ref") || "amanda25";

let current = localStorage.getItem(STORAGE_KEY_LANG) || "de";
if(!LANGS[current]) current = "de";

const badgeText = document.getElementById("badgeText");
const modalTitle = document.getElementById("modalTitle");
const modalBody  = document.getElementById("modalBody");
const refName    = document.getElementById("refName");
const rewardLabel= document.getElementById("rewardLabel");
const rewardValue= document.getElementById("rewardValue");
const rewardHint = document.getElementById("rewardHint");
const claimBtn   = document.getElementById("claimBtn");

const tabPortfolioBig = document.getElementById("tabPortfolioBig");
const tabCashBig = document.getElementById("tabCashBig");
const totalLabel = document.getElementById("totalLabel");
const investmentsTitle = document.getElementById("investmentsTitle");
const splitText = document.getElementById("splitText");
const searchText = document.getElementById("searchText");
const transferText = document.getElementById("transferText");

function render(){
  const L = LANGS[current];

  document.documentElement.lang = (current === "zhCN") ? "zh-CN" : current;
  document.title = `ValoraX – ${L.name}`;

  if (badgeText) badgeText.textContent = L.badge;
  if (modalTitle) modalTitle.textContent = L.modalTitle;
  if (modalBody) modalBody.innerHTML = L.modalBody(ref);
  if (refName) refName.textContent = ref;

  if (rewardLabel) rewardLabel.textContent = L.rewardLabel;
  if (rewardValue) rewardValue.textContent = L.rewardValue;
  if (rewardHint) rewardHint.textContent = L.rewardHint;
  if (claimBtn) claimBtn.textContent = L.claim;

  if (tabPortfolioBig) tabPortfolioBig.textContent = L.portfolio;
  if (tabCashBig) tabCashBig.textContent = L.cash;
  if (totalLabel) totalLabel.textContent = L.total;
  if (investmentsTitle) investmentsTitle.textContent = L.investments;
  if (splitText) splitText.innerHTML = `${L.split} <span style="font-size:18px;opacity:.7;">▾</span>`;
  if (searchText) searchText.textContent = L.search;
  if (transferText) transferText.textContent = L.transfer;
}

if (claimBtn){
  claimBtn.addEventListener("click", () => {
    window.location.href = "bonus.html";
  });
}

render();
</script>
</body>
</html>
