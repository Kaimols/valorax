<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ValoraX – Selfie Verifizierung</title>

<style>
:root{
  --bg:#000;
  --text:#fff;
  --muted:rgba(255,255,255,.55);
  --line:rgba(255,255,255,.18);
  --accent:#46f39a;
}
*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:560px;
  padding:32px 24px;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

.brand{
  font-weight:900;
  font-size:16px;
}
.brand span{ color:var(--accent); }

h1{
  margin:60px 0 14px 0;
  font-size:22px;
  line-height:1.3;
}

.sub{
  font-size:14px;
  color:var(--muted);
  font-weight:700;
  margin-bottom:20px;
}

.cameraBox{
  position:relative;
  width:100%;
  height:320px;
  border-radius:18px;
  overflow:hidden;
  border:1px solid var(--line);
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
}

video, canvas{
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay{
  position:absolute;
  width:80%;
  height:60%;
  border:2px solid var(--accent);
  border-radius:16px;
  pointer-events:none;
}

.actions{
  margin-top:auto;
  padding-top:24px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

button{
  width:100%;
  height:52px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.18);
  background:#fff;
  color:#000;
  font-weight:1000;
  font-size:14px;
  cursor:pointer;
}

button.secondary{
  background:transparent;
  color:#fff;
}

button:disabled{
  opacity:.4;
  cursor:not-allowed;
}
</style>
</head>
<body>

<div class="container">
  <div class="brand">Valora<span>X</span></div>

  <h1>Halte deinen Ausweis neben dein Gesicht</h1>
  <div class="sub">
    Positioniere dein Gesicht und die Vorderseite deines Ausweises im Rahmen.
  </div>

  <div class="cameraBox">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div class="overlay"></div>
  </div>

  <div class="actions">
    <button id="captureBtn">Foto aufnehmen</button>
    <button id="continueBtn" disabled>Verifizierung abschließen</button>
  </div>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const captureBtn = document.getElementById("captureBtn");
const continueBtn = document.getElementById("continueBtn");

let stream;

// Kamera starten (Frontkamera)
async function startCamera(){
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"user" },
      audio:false
    });
    video.srcObject = stream;
  }catch(err){
    alert("Kamera konnte nicht geöffnet werden.");
  }
}

captureBtn.addEventListener("click", ()=>{
  const ctx = canvas.getContext("2d");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video,0,0);

  video.style.display = "none";
  canvas.style.display = "block";
  captureBtn.textContent = "Neu aufnehmen";
  continueBtn.disabled = false;
});

continueBtn.addEventListener("click", ()=>{
  if(continueBtn.disabled) return;

  // Kamera stoppen
  if(stream){
    stream.getTracks().forEach(track=>track.stop());
  }

  window.location.href = "loading3.html";
});

startCamera();
</script>

</body>
</html>
