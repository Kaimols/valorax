<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>ValoraX</title>

<!-- Open Graph -->
<meta property="og:title" content="ValoraX" />
<meta property="og:description" content="Welcome to ValoraX" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://valorax-opal.vercel.app/" />
<meta property="og:image" content="https://valorax-opal.vercel.app/og-image.jpg" />

<!-- Twitter / viele Apps nutzen das auch -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="ValoraX" />
<meta name="twitter:description" content="Welcome to ValoraX" />
<meta name="twitter:image" content="https://valorax-opal.vercel.app/og-image.jpg" />

<style>
:root{
  --bg:#000;
  --text:#fff;
}

*{box-sizing:border-box}

html, body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:var(--bg);
}

body{
  height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "PingFang SC",
    "Microsoft YaHei",
    "Noto Sans SC",
    system-ui,
    sans-serif;
  color:var(--text);
}

/* Logo */
.logo{
  font-weight:900;
  font-size:28px;
  letter-spacing:.04em;
  opacity:0;
  animation:fadeIn .6s ease forwards;
}

.logo span{
  color:#46f39a;
}

/* Sanfte Animation */
@keyframes fadeIn{
  to{ opacity:1; }
}
</style>
</head>

<body>

<div class="logo">
  Valora<span>X</span>
</div>

<script>
// 2 Sekunden warten, dann weiterleiten
setTimeout(() => {
  document.body.style.opacity = "0";
  document.body.style.transition = "opacity .4s ease";
  setTimeout(() => {
    window.location.href = "screen.html";
  }, 400);
}, 1600);
</script>

</body>
</html>
