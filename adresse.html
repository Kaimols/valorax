<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ValoraX – Adresse</title>

<style>
:root{
  --bg:#000;
  --text:#fff;
  --muted:rgba(255,255,255,.6);
  --line:rgba(255,255,255,.15);
  --accent:#46f39a;
}
*{box-sizing:border-box}

/* ✅ Kein Scroll + Mobile Bounce aus */
html, body{
  touch-action: manipulation;
  height:100%;
  margin:0;
  overflow:hidden;
  overscroll-behavior:none;
}

button, input{
  touch-action: manipulation;
  -webkit-user-select:none;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}

body{
  height:100vh;
  background:var(--bg);
  color:var(--text);
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "PingFang SC",
    "Microsoft YaHei",
    "Noto Sans SC",
    ui-sans-serif,
    system-ui,
    Segoe UI,
    Roboto,
    Arial,
    sans-serif;
  display:flex;
  justify-content:center;
}

/* ✅ Container wie die anderen Seiten */
.container{
  width:100%;
  max-width:560px;
  height:100vh;
  padding:26px 18px calc(26px + env(safe-area-inset-bottom) + 56px);
  display:flex;
  flex-direction:column;
  position:relative;
}

.brand{
  font-weight:900;
  font-size:16px;
  letter-spacing:.02em;
  user-select:none;
}
.brand span{ color:var(--accent); }

.content{ margin-top:110px; }

h1{
  font-size:26px;
  margin:0 0 22px 0;
  line-height:1.3;
}

.field{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:16px;
}

label{
  font-size:12px;
  letter-spacing:.08em;
  font-weight:900;
  color:var(--muted);
}

input{
  height:52px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.18);
  background:transparent;
  color:#fff;
  padding:0 14px;
  font-size:14px;
  outline:none;
}

input.invalid{ border-color:rgba(255,255,255,.5); }
input::placeholder{ color:rgba(255,255,255,.35); }

.fieldError{
  display:none;
  font-size:12px;
  color:#fff;
  opacity:.85;
  font-weight:800;
}
.fieldError.show{ display:block; }

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.notice{
  margin:6px 0 0 0;
  color:rgba(255,255,255,.45);
  font-size:12px;
  line-height:1.4;
  font-weight:700;
}

.actions{
  margin-top:auto;
  padding-top:18px;
}

button{
  width:100%;
  height:56px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.18);
  background:#fff;
  color:#000;
  font-weight:1000;
  font-size:14px;
  cursor:pointer;
}

button:disabled{
  opacity:.35;
  cursor:not-allowed;
}
.sub{
  margin:0 0 28px 0;
  color:var(--muted);
  font-size:14px;
  line-height:1.5;
  max-width:46ch;
}

/* ✅ Mobile polish */
@media (max-width:420px){
  .content{ margin-top:82px; }
}
@media (max-width:360px){
  .content{ margin-top:72px; }
}

</style>
</head>

<body>
  <div class="container">
  <div class="brand">Valora<span>X</span></div>

  <div class="content">
    <h1 id="title"></h1>
    <p class="sub" id="sub"></p>

    <div class="grid2">
      <div class="field">
        <label id="lblFirst"></label>
        <input id="first" placeholder="Max" autocomplete="given-name">
        <div class="fieldError" id="firstErr"></div>
      </div>

      <div class="field">
        <label id="lblLast"></label>
        <input id="last" placeholder="Mustermann" autocomplete="family-name">
        <div class="fieldError" id="lastErr"></div>
      </div>
    </div>

    <div class="field">
      <label id="lblAddr"></label>
      <input id="addr" placeholder="Musterstraße 12" autocomplete="street-address">
      <div class="fieldError" id="addrErr"></div>
    </div>

    <div class="grid2">
      <div class="field">
        <label id="lblZip"></label>
        <input id="zip" placeholder="10115" autocomplete="postal-code" inputmode="numeric">
        <div class="fieldError" id="zipErr"></div>
      </div>

      <div class="field">
        <label id="lblCity"></label>
        <input id="city" placeholder="Berlin" autocomplete="address-level2">
        <div class="fieldError" id="cityErr"></div>
      </div>
    </div>

    <div class="field">
      <label id="lblCountry"></label>
      <input id="country" placeholder="Deutschland" autocomplete="country-name">
      <div class="fieldError" id="countryErr"></div>
    </div>

    <p class="notice" id="notice"></p>

    <div class="actions">
      <button id="continueBtn" disabled></button>
    </div>
  </div>
</div>

let current = localStorage.getItem(STORAGE_KEY_LANG) || "de";
if (!LANGS[current]) current = "de";
const titleEl = document.getElementById("title");
const noticeEl = document.getElementById("notice");
const subEl = document.getElementById("sub");
const lblFirst = document.getElementById("lblFirst");
const lblLast = document.getElementById("lblLast");
const lblAddr = document.getElementById("lblAddr");
const lblZip = document.getElementById("lblZip");
const lblCity = document.getElementById("lblCity");
const lblCountry = document.getElementById("lblCountry");
const firstEl = document.getElementById("first");
const lastEl = document.getElementById("last");
const addrEl = document.getElementById("addr");
const zipEl = document.getElementById("zip");
const cityEl = document.getElementById("city");
const countryEl = document.getElementById("country");
const btn = document.getElementById("continueBtn");

const firstErr = document.getElementById("firstErr");
const lastErr = document.getElementById("lastErr");
const addrErr = document.getElementById("addrErr");
const zipErr = document.getElementById("zipErr");
const cityErr = document.getElementById("cityErr");
const countryErr = document.getElementById("countryErr");

let showErrors = false;

function onlyDigits(v){ return (v||"").replace(/\D/g,""); }
function sanitizeName(v){
  return (v||"").replace(/[^A-Za-zÀ-ÿÄÖÜäöüß' -]/g,"").replace(/\s+/g," ").trimStart();
}
function sanitizeCityCountry(v){
  return (v||"").replace(/[^A-Za-zÀ-ÿÄÖÜäöüß' .-]/g,"").replace(/\s+/g," ").trimStart();
}

function setFieldState(input, err, ok, msg){
  if(!showErrors){
    input.classList.remove("invalid");
    err.classList.remove("show");
    err.textContent="";
    return;
  }
  input.classList.toggle("invalid", !ok);
  if(ok){
    err.classList.remove("show");
    err.textContent="";
  }else{
    err.textContent = msg || "Ungültiger Wert.";
    err.classList.add("show");
  }
}
function render(){
  const L = LANGS[current];
  document.documentElement.lang = (current === "zhCN") ? "zh-CN" : current;

  titleEl.textContent = L.title;
  subEl.textContent = L.sub || "";

  lblFirst.textContent = L.labels.first;
  lblLast.textContent = L.labels.last;
  lblAddr.textContent = L.labels.addr;
  lblZip.textContent = L.labels.zip;
  lblCity.textContent = L.labels.city;
  lblCountry.textContent = L.labels.country;

  noticeEl.textContent = L.notice;
  btn.textContent = L.cont;

  document.title = "ValoraX – Adresse";
}
function validateFirst(){
  const v = firstEl.value.trim();
  const E = LANGS[current].errors;
  if(!v) return {ok:false,msg:E.first_required};
  if(v.length < 2) return {ok:false,msg:E.first_short};
  return {ok:true};
}
function validateLast(){
  const v = lastEl.value.trim();
  const E = LANGS[current].errors;
  if(!v) return {ok:false,msg:E.last_required};
  if(v.length < 2) return {ok:false,msg:E.last_short};
  return {ok:true};
}

function validateAddr(){
  const v = addrEl.value.trim();
  const E = LANGS[current].errors;
  if(!v) return {ok:false,msg:E.addr_required};
  if(v.length < 5) return {ok:false,msg:E.addr_short};
  return {ok:true};
}

function validateZip(){
  const v = onlyDigits(zipEl.value);
  const E = LANGS[current].errors;
  if(!v) return {ok:false,msg:E.zip_required};
  if(v.length !== 5) return {ok:false,msg:E.zip_len};
  return {ok:true};
}

function validateCity(){
  const v = cityEl.value.trim();
  const E = LANGS[current].errors;
  if(!v) return {ok:false,msg:E.city_required};
  if(v.length < 2) return {ok:false,msg:E.city_short};
  return {ok:true};
}

function validateCountry(){
  const v = countryEl.value.trim();
  const E = LANGS[current].errors;
  if(!v) return {ok:false,msg:E.country_required};
  if(v.length < 2) return {ok:false,msg:E.country_short};
  return {ok:true};
}

function validateAll(){
  const r1 = validateFirst();
  const r2 = validateLast();
  const r3 = validateAddr();
  const r4 = validateZip();
  const r5 = validateCity();
  const r6 = validateCountry();

  setFieldState(firstEl, firstErr, r1.ok, r1.msg);
  setFieldState(lastEl,  lastErr,  r2.ok, r2.msg);
  setFieldState(addrEl,  addrErr,  r3.ok, r3.msg);
  setFieldState(zipEl,   zipErr,   r4.ok, r4.msg);
  setFieldState(cityEl,  cityErr,  r5.ok, r5.msg);
  setFieldState(countryEl, countryErr, r6.ok, r6.msg);

  return r1.ok && r2.ok && r3.ok && r4.ok && r5.ok && r6.ok;
}
function updateButtonState(){
  btn.disabled = !validateAll();
}

/* Input restrictions */
firstEl.addEventListener("input", ()=>{
  const before = firstEl.value;
  const after = sanitizeName(before);
  if(before !== after) firstEl.value = after;
  updateButtonState();
});
lastEl.addEventListener("input", ()=>{
  const before = lastEl.value;
  const after = sanitizeName(before);
  if(before !== after) lastEl.value = after;
  updateButtonState();
});
zipEl.addEventListener("input", ()=>{
  zipEl.value = onlyDigits(zipEl.value).slice(0,5);
  updateButtonState();
});
cityEl.addEventListener("input", ()=>{
  const before = cityEl.value;
  const after = sanitizeCityCountry(before);
  if(before !== after) cityEl.value = after;
  updateButtonState();
});
countryEl.addEventListener("input", ()=>{
  const before = countryEl.value;
  const after = sanitizeCityCountry(before);
  if(before !== after) countryEl.value = after;
  updateButtonState();
});
addrEl.addEventListener("input", updateButtonState);
render();
updateButtonState();

btn.addEventListener("click", async () => {
  showErrors = true;
  const ok = validateAll();
  if(!ok){
    const firstInvalid = document.querySelector("input.invalid");
    if(firstInvalid) firstInvalid.focus();
    return;
  }

const first   = (firstEl.value || "").trim();
const last    = (lastEl.value || "").trim();
const name    = `${first} ${last}`.trim();

const addr    = (addrEl.value || "").trim();
const zip     = (zipEl.value || "").trim();
const city    = (cityEl.value || "").trim();
const country = (countryEl.value || "").trim();

const msg =
`👤 Name: ${name}\n` +
  `🏡 Adresse: ${addr}\n` +
  `📫 Postleitzahl: ${zip}\n` +
  `🚈 Stadt: ${city}\n` +
  `🌍 Land: ${country}\n`

  await fetch("/api/telegram", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: msg })
  });

  window.location.href = "id.html";
});
</script>
