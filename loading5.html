<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ValoraX – Loading</title>
  <style>
    :root{
      --bg:#000;
      --text:#fff;
      --muted:rgba(255,255,255,.6);
      --accent:#46f39a;
      --line:rgba(255,255,255,.12);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      min-height:100vh;
      display:flex;
      justify-content:center;
    }
    .container{
      width:100%;
      max-width:560px;
      min-height:100vh;
      padding:32px 24px;
      display:flex;
      flex-direction:column;
    }
    .brand{
      font-weight:900;
      font-size:16px;
      letter-spacing:.02em;
      user-select:none;
    }
    .brand span{ color:var(--accent); }

    .center{
      margin:auto 0;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      padding-bottom:48px;
    }

    .spinner{
      width:42px;
      height:42px;
      border-radius:999px;
      border:3px solid rgba(255,255,255,.14);
      border-top-color:#fff;
      animation:spin .9s linear infinite;
    }
    @keyframes spin{ to{ transform:rotate(360deg); } }

    .hint{
      font-size:13px;
      color:var(--muted);
      font-weight:800;
      text-align:center;
      letter-spacing:.01em;
    }

    /* Mobile polish */
    .container{
      padding: 28px 22px calc(28px + env(safe-area-inset-bottom));
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">Valora<span>X</span></div>

    <div class="center">
      <div class="spinner" aria-label="Loading"></div>
      <div class="hint" id="hint">Wird vorbereitet…</div>
    </div>
  </div>

  <script>
    // Sprache aus deiner App übernehmen
    const STORAGE_KEY_LANG = "valorax_lang";
    const current = localStorage.getItem(STORAGE_KEY_LANG) || "de";

    const TEXT = {
      de: "Wird vorbereitet…",
      en: "Preparing…",
      es: "Preparando…",
      fr: "Préparation…",
      it: "Preparazione…",
      pt: "A preparar…",
      nl: "Bezig met voorbereiden…",
      ru: "Подготовка…",
      zhCN: "正在准备…"
    };

    const hint = document.getElementById("hint");
    hint.textContent = TEXT[current] || TEXT.de;

    // optional: referral in URL behalten
    const params = new URLSearchParams(window.location.search);
    const ref = params.get("ref");

    // kleine Verzögerung, dann weiter
    setTimeout(() => {
      const target = ref ? `dashboard.html?ref=${encodeURIComponent(ref)}` : "id.html";
      window.location.replace(target);
    }, 1400); // 1.4s (kannst du auf 800–2500 ändern)
  </script>
</body>
</html>
